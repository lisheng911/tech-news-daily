name: Daily Schedule Push

on:
  schedule:
    # Tokyo 07:30 = UTC 22:30 (前一天)
    # Tokyo is UTC+9, so 07:30 Tokyo = 22:30 UTC previous day
    - cron: '30 22 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  push-schedule:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run schedule fetcher and push
        env:
          STUDENT_ID: ${{ secrets.STUDENT_ID }}
          STUDENT_PASSWORD: ${{ secrets.STUDENT_PASSWORD }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: |
          python main.py
      
      - name: Commit log (if any)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update: $(date '+%Y-%m-%d %H:%M:%S')" || true
          git push || true
